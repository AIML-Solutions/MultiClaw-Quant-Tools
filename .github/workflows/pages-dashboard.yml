name: Deploy Quant Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/github-pages/**'
      - 'lean-cli/docs/**'
      - 'research/data/**'
      - 'services/ingestion/sample_*_snapshot.json'
      - '.github/workflows/pages-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync dashboard data
        run: bash frontend/github-pages/scripts/sync_data.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
